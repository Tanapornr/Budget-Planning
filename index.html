<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>ระบบงบประมาณ วมว.</title>
    <style>
        table { border-collapse: collapse; width: 100%; font-size: 14px; }
        th, td { border: 1px solid black; padding: 6px; text-align: center; }
        th { background-color: #fca503; /* สีส้มตามรูป */ color: black; }
        .bg-light { background-color: #fdf5e6; } /* สีพื้นหลังอ่อนๆ */
    </style>
</head>
<body>
    <h3 id="status" style="color: blue;">กำลังดึงข้อมูล...</h3>

    <table>
        <thead>
            <tr>
                <th rowspan="2" style="background-color: white;">ประเภทรายจ่าย</th>
                <th rowspan="2">งบประมาณ<br>ตามแผน2569-2570</th>
                <th rowspan="2">เบิกจ่ายสะสมรวม</th>
                <th rowspan="2">คงเหลือสุทธิ</th>
                <th rowspan="2" style="background-color: #e6b8af;">ระยะเวลา</th>
                
                <th colspan="6" style="background-color: white;">ไตรมาส 3 / 2569</th>
                <th colspan="6" style="background-color: white;">ไตรมาส 4 / 2569</th>
            </tr>
            <tr>
                <th class="bg-light">เม.ย.</th>
                <th class="bg-light">พ.ค.</th>
                <th class="bg-light">มิ.ย.</th>
                <th>รวม<br>ไตรมาส 3</th>
                <th style="background-color: white;">เบิกจริง</th>
                <th style="background-color: white;">คงเหลือ</th>
                
                <th class="bg-light">ก.ค.</th>
                <th class="bg-light">ส.ค.</th>
                <th class="bg-light">ก.ย.</th>
                <th>รวม<br>ไตรมาส 4</th>
                <th style="background-color: white;">เบิกจริง</th>
                <th style="background-color: white;">คงเหลือ</th>
            </tr>
        </thead>
        <tbody id="table-body">
            </tbody>
    </table>

    <script>
        const url = 'https://script.google.com/macros/s/AKfycbyAXl94c7Bj9GZNEOPCOUo0p42uAKA5b4o6T1ctwoQ-ej6aj5Wi7cM_ykSNO2AyGeYK/exec';

        fetch(url)
            .then(response => response.json())
            .then(data => {
                document.getElementById('status').innerText = 'ดึงข้อมูลสำเร็จแล้ว! 🎉';
                const tbody = document.getElementById('table-body');
                
                // คราวนี้เราเรียกข้อมูลตามลำดับคอลัมน์ A=0, B=1, C=2 ไปเรื่อยๆ
                data.forEach(row => {
                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td style="text-align: left;">${row[0]}</td> <td>${row[1]}</td> <td>${row[2]}</td> <td>${row[3]}</td> <td>${row[4]}</td> <td>${row[5]}</td>
                        <td>${row[6]}</td>
                        <td>${row[7]}</td>
                        <td>${row[8]}</td>
                        <td>${row[9]}</td>
                        <td>${row[10]}</td>
                        
                        <td>${row[11]}</td>
                        <td>${row[12]}</td>
                        <td>${row[13]}</td>
                        <td>${row[14]}</td>
                        <td>${row[15]}</td>
                        <td>${row[16]}</td>
                    `;
                    tbody.appendChild(tr);
                });
            })
            .catch(error => {
                document.getElementById('status').innerText = 'เกิดข้อผิดพลาดในการดึงข้อมูล';
            });
    </script>
</body>
</html>
